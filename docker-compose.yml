services:
  skindesk:
    build: .
    image: skindesk:latest
    container_name: skindesk
    restart: unless-stopped
    ports:
      - "8777:8777"          # 如需改端口，可写成 "宿主机端口:8777"，例如 "9000:8777"
    environment:
      - SKINDESK_HOST=0.0.0.0
    volumes:
      - ./data:/data          # secret.json 等本地数据保存在这里，便于持久化和备份
